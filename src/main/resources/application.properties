spring.application.name=dbms

# Neon PostgreSQL (Cloud)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:dbms;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:local-dev-jwt-secret-local-dev-jwt-secret}
jwt.expiration=86400000